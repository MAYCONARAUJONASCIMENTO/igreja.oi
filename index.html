<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
     <div class="aba">
      
    <div class="logim">
          <h1>Fazer Logim Da Igreja</h1>
        <form>
        <label for="email">Email:</label>
        <input class="gmail" type="email" name="email" id="email" placeholder="seu@email.com" required>
          <label for="senha">Senha:</label>
          <input class="senha" type="password" name="senha" id="senha" placeholder="sua senha" required>
            <label for="numero">Número:</label>
            <input class="nuemero" type="numbero" name="numero" id="numero" placeholder="seu número" required>
              <label for="estado">Estado:</label>
              <input class="estado" type="text" name="estado" id="estado" placeholder="seu estado" required>
              <button type="submit" class="btn-enviar">Enviar</button>
        </form>
    </div> 
</div>
</body>
</html>
