<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Login - Igreja</title>
</head>
<body>
    <div class="container-login">
        <div class="login-box">
            <div class="login-header">
                <h1>Bem-vindo</h1>
                <p>Portal de Login - Igreja</p>
            </div>

            <form action="https://api.sheetmonkey.io/form/rexRdbUKvJca9vXJV2tfaW" method="post" class="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" name="senha" id="senha" placeholder="Sua senha" required>
                </div>

                <div class="form-group">
                    <label for="numero">Telefone</label>
                    <input type="tel" name="numero" id="numero" placeholder="(11) 98765-4321" required>
                </div>

                <div class="form-group">
                    <label for="estado">Estado Civil</label>
                    <input type="text" name="estado" id="estado" placeholder="Estado Civil" required>
                </div>

                <div class="form-group">
                    <label for="endereco">Endereço</label>
                    <input type="text" name="endereco" id="endereco" placeholder="Rua/Avenida" required>
                </div>

                <div class="form-group">
                    <label for="numero-casa">Número</label>
                    <input type="number" name="numero-casa" id="numero-casa" placeholder="Número da casa" required>
                </div>

                <div class="form-group">
                    <label for="bairro">Bairro</label>
                    <input type="text" name="bairro" id="bairro" placeholder="Seu bairro" required>
                </div>

                <button type="submit" class="btn-login">Entrar</button>
            </form>
        </div>
    </div>
</body>
</html>
